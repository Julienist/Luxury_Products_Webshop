name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Start Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Write env.js
        working-directory: frontend
        run: |
          cat > dist/retro-vania/browser/assets/env.js << EOF
          (function (window) {
            window.__env = {
              baseApiUrl: "${{secrets.API_URL }}"
            };
          })(this);
          EOF

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: frontend/dist/retro-vania/browser/
          remote_path: ${{ secrets.VPS_FRONTEND_PATH }}
          remote_host: ${{ secrets.TAILSCALE_IP }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
