name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/luxury-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Start Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # ephemeral: true zorgt dat de node zichzelf opruimt na de run
          args: --ephemeral

      - name: Deploy via SSH (Tailscale IP)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_TAILSCALE_IP }}   # 100.x.x.x adres van je VPS
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_BACKEND_PATH }}
            podman pull ghcr.io/${{ github.repository_owner }}/luxury-backend:latest
            podman-compose -f compose.prod.yaml down
            podman-compose -f compose.prod.yaml up -d
