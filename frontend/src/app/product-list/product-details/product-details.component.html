<div *ngIf="product; else loading" class="product-container">
  <div class="product-image">
    <img [ngSrc]="product.imageUrl" [alt]="product.name" width="300" height="100"/>
  </div>

  <div class="product-info">
    <h1 class="product-title">{{ product.name }}</h1>
    <p class="product-description">{{ product.description }}</p>
    <p class="product-price">{{ 'product.price' | translate }}{{ product.price }}</p>

    <button class="buy-button" (click)="addToCart()">{{ 'product.add' | translate }}</button>

  </div>
</div>

<ng-template #loading>
  <p class="loading-text">{{ 'product.loading' | translate }}</p>
</ng-template>
