<li class="product" (click)="goToProduct(product.id)">
  <img [src]="product.imageUrl" [alt]="product.name" />
  <p>{{ product.name }}</p>
  <p>{{ '€' + product.price }}</p>

  <div>
    <button (click)="addToCart($event); $event.stopPropagation()">
      {{ 'product.buy' | translate }}
    </button>
  </div>
</li>
