server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self'; form-action 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.postimg.cc https://i0.wp.com https://www.eugenevanbaal.nl https://a.1stdibscdn.com https://www.net-a-porter.com https://en.louisvuitton.com https://images.vestiairecollective.com https://grandvision-media.imgix.net https://image4.cdnsbg.com https://chronexttime.imgix.net; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' http://localhost:8080;";
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
    }

    location /api/ {
        set $upstream backend:8080;
        proxy_pass http://$upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' 'http://localhost:4200';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
        add_header 'Access-Control-Allow-Credentials' 'true';

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
